# set up view
set -g default-terminal 'screen-256color'

# temp
bind r source-file ~/.tmux.conf \; display 'Config reloaded!'

set -g status-fg black
set -g status-bg grey

set -g status-justify left
set -g status-left "#[fg=black,bold] #h #[default] "
#set -g status-left-length 40

# Claude Code indicator config
set -g @claude-stop-bg "red"
set -g @claude-stop-fg "white"
set -g @claude-stop-sym "X"
#set -g @claude-stop-sym "✘"
set -g @claude-input-bg "yellow"
set -g @claude-input-fg "white"
#set -g @claude-input-sym "❯"
set -g @claude-input-sym "!"

set -g window-status-format "#{?#{==:#{@claude},done},#[bg=#{@claude-stop-bg}]#[fg=#{@claude-stop-fg}]#{@claude-stop-sym}#[fg=black]#[bg=default],#{?#{==:#{@claude},input},#[bg=#{@claude-input-bg}]#[fg=#{@claude-input-fg}]#{@claude-input-sym}#[fg=black]#[bg=default], }} #I:#W "
set -g window-status-current-format " #[bg=white,fg=black,bold] #I:#W #[default]"
set -g status-interval 30
set -g status-right "#([ -x ~/.local/bin/claude-status ] && ~/.local/bin/claude-status) | %H:%M %d-%b-%y "
set -g status-right-length 120

# switch to next active session, only quit tmux when all sessions closed
set -g detach-on-destroy off
# base indexes should be 1, not 0
setw -g pane-base-index 1
set -g base-index 1
# do not rename windows automatically
# set -g allow-rename off

# interaction
setw -g mode-keys vi
set -g mouse on

# move around panes with hjkl, as one would in vim after pressing ctrl-w
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# macOS clipboard
# enable copy and paste in macOS using reattach-to-user-namespace program
# https://github.com/tmux/tmux/issues/543#issuecomment-298193820
# https://github.com/ChrisJohnsen/tmux-MacOSX-pasteboard/blob/master/Usage.md#cross-platform-conditional-usage
if-shell "uname | grep -q Darwin" {
  bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"
  bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"
}

# Wayland clipboard
if-shell "uname | grep -q Linux" {
  set -s copy-command 'wl-copy'
}

## open win/split in same dir as current pane
unbind-key c
bind-key c new-window -c "#{pane_current_path}" -n ""

unbind-key '"'
bind-key '"' split-window -v -c "#{pane_current_path}"

unbind-key %
bind-key % split-window -h -c "#{pane_current_path}"

#NVIM advice
set -sg escape-time 10
set -g focus-events on

set -sa terminal-features ',xterm-256color:RGB'

# Claude Code completion indicators
# allow-passthrough lets Claude's native notifications reach the outer terminal
set -g allow-passthrough on
# clear the indicator when you focus a pane in that window
set-hook -g pane-focus-in "set-option -wqu @claude"

# Independent window viewing for shared sessions
# First person:  tmux attach -t main
# Second person: tmux new-session -t main -s jeff
# Both see the same windows but can switch independently.
